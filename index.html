<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JEEVA Juice</title>

<style>
body { margin:0; font-family:'Segoe UI',sans-serif; }
.hero { display:flex; height:100vh; }

/* LEFT PANEL */
.left {
  width:50%;
  background:#1f1f1f;
  color:white;
  padding:25px;
}

.topbar { display:flex; align-items:center; }

.brand-row { display:flex; align-items:center; gap:10px; }

.logo { width:55px; border-radius:50%; }

.brand { font-size:32px; font-weight:bold; }

.tabs { display:flex; gap:10px; margin-left:20px; }

.tab {
  padding:8px 16px;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
  cursor:pointer;
}

.tab.active { background:#6bbf59; }

.content-box {
  margin-top:20px;
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:12px;
  min-height:300px;
}

.cta {
  margin-top:10px;
  padding:10px 18px;
  border:none;
  border-radius:20px;
  background:#6bbf59;
  color:white;
  cursor:pointer;
  display:none;
}

/* RIGHT PANEL */
.right {
  width:50%;
  background:linear-gradient(135deg,#ff7f50,#ff9966);
  display:flex;
  gap:20px;
  padding:20px;
  position:relative;
}

/* PRODUCT SECTION */
.product-section {
  width:65%;
  display:flex;
  flex-direction:column;
  height:100%;
  justify-content:space-between;
}

.image-box {
  height:48%;
  margin-bottom:15px;
}

.product {
  width:100%;
  height:100%;
  max-height:300px;
  object-fit:cover;
  border-radius:12px;
}

/* DESCRIPTION */
.desc-box {
  height:48%;
  background:rgba(255,255,255,0.25);
  padding:12px 12px 8px 12px;
  border-radius:12px;
  color:white;
  overflow-y:auto;
  scrollbar-width:none;
}

.desc-box::-webkit-scrollbar{
  display:none; /* Chrome */
}

.desc-box p{
  margin:0;   /* removes top gap */
  line-height:1.5;
}

/* RIGHT MENU */
.juice-menu {
  position:absolute;
  right:20px;
  top:20px;
  bottom:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
  overflow-y:auto;
}

.juice-btn {
  width:170px;
  padding:8px;
  font-size:13px;
  border-radius:10px;
  background:rgba(255,255,255,0.25);
  text-align:center;
  cursor:pointer;
}

.juice-btn.active {
  background:white;
  color:#ff7f50;
  font-weight:bold;
}

@media(max-width:768px){
  .hero { flex-direction:column; }
  .left,.right { width:100%; }
}

/* ================= FINAL MOBILE FIX (CLEAN + STABLE) ================= */
@media (max-width:768px){

  /* GLOBAL */
  html, body{
    width:100%;

    font-size:15px;

    flex-direction:column;
    height:auto !important;
    width:100%;
    overflow:hidden;
  }

  .left, .right{

    text-align:left !important;
  }

  .content-box{
    padding:15px !important;
    min-height:auto !important;
    text-align:left !important;
  }

  .content-box h3{
    font-size:16px;
  }

  .content-box p{
    font-size:13px;
  }

  /* PRICING TABLE */
  table{
    width:100% !important;
    font-size:12px !important;
  }

  table th, table td{
    padding:6px 4px;
  }

  table td{
    word-break:break-word;
  }

  table td:last-child{
    text-align:right;
  }

  /* ORDER BUTTON */
  .cta{
    width:auto !important;
    padding:6px 14px !important;
    font-size:12px !important;
    margin-top:10px;
  }

  /* RIGHT PANEL */
  .right{
    flex-direction:column;
    position:relative;
    padding:15px;
    box-sizing:border-box;
    overflow:hidden;
    height:auto !important;
    min-height:auto !important;
    padding-bottom:5px !important;
    margin-bottom:0 !important;

    gap:0px !important;
    width:100%;
  }

  /* IMAGE (NO HEIGHT RESTRICTION) */
  .image-box{
    width:100%;
    margin-bottom:5px !important;
  }

  .product{
    width:100%;
    height:auto;
    border-radius:12px;
  }

  /* DESCRIPTION (NO HEIGHT RESTRICTION) */
  .desc-box{
    height:auto;
    font-size:14px;            /* 🔥 slightly bigger */
    padding:14px;
    margin-bottom:0 !important;
    padding-bottom:8px !important;
    line-height:1.5;
  }

  /* PRODUCT LIST (SWIPE) */
  .juice-menu{
    display:flex;
    flex-direction:row;
    overflow-x:auto;
    overflow-y:hidden;
    gap:8px;
    padding-top:5px !important;
    margin-top:5px !important;   /* 🔥 GAP REMOVED */
    align-items:center;
    box-sizing:border-box;
    width:100%;
    position:relative;
    z-index:2;
    min-height:50px;
  }

  .juice-menu::-webkit-scrollbar{
    display:none;
  }

  .juice-btn{
    flex:0 0 auto;
    min-width:95px;
    max-width:130px;
    font-size:12px;
    padding:8px 10px;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    line-height:1.3;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

 .product-section > *{
    margin-bottom:0 !important;
}

}

</style>
</head>

/* FUNCTIONS */
function showTab(e,tab){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
e.target.classList.add("active");

document.getElementById("contentBox").innerHTML=content[tab];
document.getElementById("orderBtn").style.display = (tab==="pricing") ? "inline-block" : "none";
}

function renderMenu(){
let html="";
for(let k in juices){
html+=`<div class="juice-btn" data-key="${k}" onclick="changeJuice('${k}',event)">${juices[k].name}</div>`;
}
document.getElementById("juiceMenu").innerHTML=html;
}

function changeJuice(k,e){
currentJuice=k;
let j=juices[k];

document.getElementById("juiceImg").src = j.img + "?v=" + Date.now();
document.getElementById("juiceText").innerText=j.text;

/* ACTIVE BUTTON FIX */
document.querySelectorAll(".juice-btn").forEach(btn=>{
btn.classList.remove("active");
if(btn.dataset.key === k){
btn.classList.add("active");
}
});

window.history.pushState({}, "", "?juice="+k);

/* SCROLL FIX */
if(e){
document.querySelector('.juice-menu').scrollLeft = e.target.offsetLeft - 50;
}
}

function orderNow(){
let msg=`Hello, I want to order ${juices[currentJuice].name}`;
window.open(`https://wa.me/918657818129?text=${encodeURIComponent(msg)}`);
}

function loadFromURL(){
let params=new URLSearchParams(window.location.search);
let j=params.get("juice");
if(j && juices[j]) changeJuice(j);
else changeJuice("abc");
}

function scrollProducts(direction){
  const container = document.querySelector(".juice-menu");
  const scrollAmount = 150;

  container.scrollBy({
    left: direction * scrollAmount,
    behavior: "smooth"
  });
}

/* INIT */
renderMenu();
showTab({target:document.querySelector(".tab")},"about");
loadFromURL();
